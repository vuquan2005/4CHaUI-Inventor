name: Release Inventor

on:
    push:
        branches:
            - main
        paths-ignore:
            - ".github/**"
            - ".gitignore"
            - ".gitattributes"
            - "README.md"
    workflow_dispatch:

jobs:
    release-projects:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 2

            - name: Zip and Release Changed Projects
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
                  FULL_SHA="${{ github.sha }}"
                  SHORT_SHA="${FULL_SHA:0:7}"
                  EVENT_NAME="${{ github.event_name }}"

                  if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
                    DIFF_BASE=""
                    echo "🚀 Manual trigger - Archiving all existing directories."
                  elif git rev-parse HEAD^ >/dev/null 2>&1; then
                    DIFF_BASE="HEAD^"
                    echo "🔍 Comparing changes with previous commit ($DIFF_BASE)"
                  else
                    DIFF_BASE=""
                    echo "⚠️ First commit - Will archive all existing directories."
                  fi

                  find . -type f -name "*.ipj" -print0 | while IFS= read -r -d $'\0' IPJ_FILE; do
                    DIR_PATH=$(dirname "$IPJ_FILE")
                    DIR="${DIR_PATH#./}"
                    BASENAME=$(basename "$DIR")

                    if [[ "$DIR" == "." || "$DIR" == "" ]]; then continue; fi

                    if [[ -n "$DIFF_BASE" ]]; then
                      if git diff --quiet "$DIFF_BASE" HEAD -- "$DIR"; then
                        echo "⏩ Skipping [$DIR]: No changes."
                        continue
                      fi
                    fi

                    echo "🛠️ Processing project: $DIR (Release name: $BASENAME)"

                    zip -r "${BASENAME}.zip" "$DIR" \
                      -x "*/OldVersions/*" \
                      -x "*.bak" \
                      -x "*.lck" \
                      -x "*.tmp" \
                      -x "*/.git*" \
                      -x "*/node_modules/*"

                    echo "♻️ Updating Rolling Tag for: $BASENAME"
                    gh release delete "$BASENAME" --cleanup-tag -y || true
                    
                    sleep 5

                    RELEASE_NOTES="### 📝 Update Information
                    - **Project:** \`$DIR\`
                    - **Last modified in commit:** [\`$SHORT_SHA\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
                    - **Time:** $TIMESTAMP
                    - **Triggered by:** @${{ github.actor }}"

                    gh release create "$BASENAME" "${BASENAME}.zip" \
                        --title "$BASENAME" \
                        --notes "$RELEASE_NOTES"
                      
                    echo "✅ Successfully updated project: $BASENAME"
                  done
