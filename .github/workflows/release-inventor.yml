name: Release Inventor

on:
    push:
        branches:
            - main
        paths-ignore:
            - ".github/**"
            - ".gitignore"
            - ".gitattributes"
            - "README.md"

jobs:
    release-projects:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Zip and Release Changed Projects
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
                  FULL_SHA="${{ github.sha }}"
                  SHORT_SHA="${FULL_SHA:0:7}"

                  if git rev-parse HEAD^ >/dev/null 2>&1; then
                    DIFF_BASE="HEAD^"
                    echo "🔍 So sánh thay đổi với commit trước ($DIFF_BASE)"
                  else
                    DIFF_BASE=""
                    echo "⚠️ Commit đầu tiên - Sẽ nén tất cả các thư mục hiện có."
                  fi

                  for DIR in */; do
                    DIR="${DIR%/}" # Loại bỏ dấu / ở cuối tên thư mục

                    if [[ "$DIR" == .* ]]; then continue; fi

                    if [[ -n "$DIFF_BASE" ]]; then
                      if git diff --quiet "$DIFF_BASE" HEAD -- "$DIR"; then
                        echo "⏩ Bỏ qua [$DIR]: Không có thay đổi."
                        continue
                      fi
                    fi

                    echo "🛠️ Đang xử lý dự án: $DIR"

                    zip -r "${DIR}.zip" "$DIR" \
                      -x "*/OldVersions/*" \
                      -x "*.bak" \
                      -x "*.lck" \
                      -x "*.tmp" \
                      -x "*/.git*"

                    echo "♻️ Cập nhật Rolling Tag cho: $DIR"
                    gh release delete "$DIR" --cleanup-tag -y || true
                    
                    sleep 2

                    gh release create "$DIR" "${DIR}.zip" \
                      --title "📦 $DIR (Bản mới nhất)" \
                      --notes "### 📝 Thông tin cập nhật
                      - **Project:** \`$DIR\`
                      - **Lần cuối thay đổi tại commit:** [\`$SHORT_SHA\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
                      - **Thời gian:** $TIMESTAMP
                      - **Thực hiện bởi:** @${{ github.actor }}
                      
                      ---
                      *Lưu ý: Đây là Rolling Release. File ZIP bên dưới luôn là phiên bản mới nhất của thư mục này.*"

                    echo "✅ Đã cập nhật xong dự án: $DIR"
                  done
